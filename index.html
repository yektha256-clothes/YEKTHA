<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Yektha - Premium Curations</title>
 
  <link rel="icon" type="image/jpeg" href="./logo.jpeg">
  <link rel="apple-touch-icon" sizes="1024x1024" href="./logo.jpeg">
  <link rel="shortcut icon" href="./logo.jpeg">
 
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fcfcfc;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --accent: #000000;
      --gold: #c5a059; /* ലോഗോയിലെ ഗോൾഡൻ ഷേഡ് */
      --max-width: 1100px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: #fff;
      padding: 10px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.04);
    }

    /* --- Brand Identity Section --- */
    .brand-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .main-logo {
      width: 45px; /* Perfect Size for Mobile */
      height: auto;
      opacity: 0;
      transform: scale(0.9);
      animation: logoEntrance 0.6s ease-out forwards;
    }

    @keyframes logoEntrance {
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      letter-spacing: 7px;
      text-transform: uppercase;
      font-weight: 700;
      display: flex;
      justify-content: center;
      color: var(--accent);
    }
    
    h1 span {
      display: inline-block;
      opacity: 0;
      animation: revealLetter 0.5s forwards;
    }
    h1 span:nth-child(n) { animation-delay: 0.3s; }

    @keyframes revealLetter { to { opacity: 1; } }

    .brand-line {
      width: 0; height: 1px; background: var(--gold);
      margin: 4px auto 10px auto;
      animation: growLine 0.8s ease-out forwards;
      animation-delay: 0.5s;
    }
    @keyframes growLine { to { width: 25px; } }

    /* --- Search Bar --- */
    .search-bar {
      width: 95%;
      max-width: 400px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #f0f0f0;
      background: #f9f9f9;
      font-size: 0.85rem;
      outline: none;
      text-align: center;
      margin: 5px auto;
      display: block;
      transition: all 0.3s;
    }
    .search-bar:focus { border-color: var(--gold); background: #fff; }

    /* --- Categories --- */
    .cat-container {
      background: #fff;
      padding: 12px 0;
      display: flex;
      justify-content: center;
      overflow-x: auto;
      gap: 10px;
      scrollbar-width: none;
      border-bottom: 1px solid #f5f5f5;
    }
    .cat-container::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 8px 16px;
      background: #f8f8f8;
      color: #777;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .cat-btn.active { 
      background: var(--accent); 
      color: #fff; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* --- Product Grid --- */
    .container { padding: 15px; max-width: var(--max-width); margin: 0 auto; }
    main { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

    @media (min-width: 768px) {
      main { grid-template-columns: repeat(4, 1fr); gap: 25px; }
      h1 { font-size: 2rem; }
      .main-logo { width: 60px; }
    }

    .card {
      background: var(--card-bg);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      transition: all 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #fefefe; }

    .info { padding: 12px; text-align: center; }
    .info h4 { margin: 0; font-size: 0.85rem; font-weight: 500; color: #444; }
    .price { display: block; font-weight: 700; font-size: 1.1rem; color: var(--accent); padding: 5px 0; }
    .rating { font-size: 0.7rem; color: var(--gold); letter-spacing: 1px; }

    .buy-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 14px; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; width: 100%; cursor: pointer;
      letter-spacing: 1px;
    }

    /* --- Modal Customizations --- */
    .modal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: #ffffff; overflow-y: auto;
    }
    .modal-content {
      background: #fff; width: 100%; max-width: 500px; margin: 0 auto;
      min-height: 100vh; position: relative;
    }
    .close-modal {
      position: absolute; right: 20px; top: 20px; font-size: 30px;
      background: #fff; width: 45px; height: 45px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10;
    }
    .modal-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
    .modal-info { padding: 30px 20px; padding-bottom: 120px; }
    .modal-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 10px; }
    .modal-buy-btn {
      background: var(--accent); color: #fff; border: none;
      width: 100%; padding: 18px; font-size: 0.9rem; font-weight: 700;
      border-radius: 10px; margin-top: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    body.modal-open { overflow: hidden; height: 100vh; }
    body.modal-open .container, body.modal-open header, body.modal-open .cat-container { display: none; }
  </style>
</head>
<body>

<header>
  <div class="brand-container">
    <img src="./logo-main.png" alt="Yektha Logo" class="main-logo">
    <h1>
      <span>Y</span><span>E</span><span>K</span><span>T</span><span>H</span><span>A</span>
    </h1>
  </div>
  <div class="brand-line"></div>
  <input type="text" id="search" placeholder="What are you looking for?" class="search-bar">
</header>

<div class="cat-container" id="categories"></div>

<div class="container">
  <main id="products-grid">
    <div id="loading" style="grid-column: 1/-1; text-align: center; padding: 100px; color: #999; font-size: 0.8rem; letter-spacing: 2px;">CURATING...</div>
  </main>
</div>

<div id="productModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">×</span>
    <img id="modalImg" src="" class="modal-img">
    <div class="modal-info">
      <h2 id="modalName" class="modal-name"></h2>
      <div id="modalPrice" class="price" style="font-size:1.6rem; color:var(--gold);"></div>
      <div id="modalRating" class="rating" style="font-size: 0.9rem; margin-bottom:20px;"></div>
      
      <p style="font-size: 0.9rem; color: #666; line-height: 1.7;">
        Exclusively curated premium piece by Yektha. Experience elegance and comfort combined.
      </p>
      <button id="modalCartBtn" class="modal-buy-btn">ORDER ON WHATSAPP</button>
      <button class="back-btn" onclick="closeModal()" style="background:none; border:none; width:100%; color:#999; margin-top:15px; font-size:0.7rem; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">← Back to Collection</button>
    </div>
  </div>
</div>

<script>
  const SHEET_ID = '1HyGFrTu37DJ4u9mxx2vK0aBC5B_yqViRGESUEkV34aU';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  let allProducts = [];

  async function fetchProducts() {
    try {
      const response = await fetch(SHEET_URL);
      const text = await response.text();
      const jsonText = text.match(/google\.visualization\.Query\.setResponse\((.*)\)/)[1];
      const data = JSON.parse(jsonText);
      allProducts = data.table.rows.map(row => ({
        name: row.c[0]?.v || 'Product',
        price: row.c[1]?.v || '0',
        rating: row.c[2]?.v || '⭐⭐⭐⭐',
        category: row.c[3]?.v || 'General',
        photo: row.c[4]?.v || 'https://via.placeholder.com/500'
      }));
      setupCategories();
      displayProducts(allProducts);
    } catch (e) {
      document.getElementById('products-grid').innerHTML = "<div style='grid-column:1/-1; text-align:center;'>Unable to load collection.</div>";
    }
  }

  function displayProducts(products) {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = products.map(p => `
      <div class="card" onclick="openModal('${p.name.replace(/'/g, "\\'")}', '${p.price}', '${p.rating}', '${p.photo.replace(/'/g, "\\'")}')">
        <img src="${p.photo}" loading="lazy" alt="${p.name}">
        <div class="info">
          <h4>${p.name}</h4>
          <span class="price">₹${p.price}</span>
          <div class="rating">${p.rating}</div>
        </div>
        <button class="buy-btn">View Details</button>
      </div>
    `).join('');
  }

  function setupCategories() {
    const categoriesDiv = document.getElementById('categories');
    const uniqueCats = ['All', ...new Set(allProducts.map(p => p.category))];
    categoriesDiv.innerHTML = uniqueCats.map(c => `
      <button class="cat-btn ${c==='All'?'active':''}" onclick="filter('${c}', this)">${c}</button>
    `).join('');
  }

  function filter(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat);
    displayProducts(filtered);
  }

  function openModal(name, price, rating, photo) {
    document.getElementById('modalName').textContent = name;
    document.getElementById('modalPrice').textContent = '₹' + price;
    document.getElementById('modalRating').textContent = rating;
    document.getElementById('modalImg').src = photo;

    document.getElementById('modalCartBtn').onclick = () => {
      const wpNumber = "7594069256";
      const msg = encodeURIComponent(`Hi Yektha! I love this: ${name} (₹${price}). Is it available?`);
      window.open(`https://wa.me/${wpNumber}?text=${msg}`, "_blank");
    };

    const modal = document.getElementById('productModal');
    modal.style.display = "block";
    document.body.classList.add('modal-open');
  }

  function closeModal() {
    document.getElementById('productModal').style.display = "none";
    document.body.classList.remove('modal-open');
  }

  document.getElementById('search').oninput = e => {
    const val = e.target.value.toLowerCase();
    displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)));
  };

  fetchProducts();
</script>
</body>
</html>
